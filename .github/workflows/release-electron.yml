name: Release Electron App

on:
  release:
    types:
      - published

permissions:
  contents: write
  packages: read

jobs:
  build-windows-app-directory:
    runs-on: windows-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build unsigned Electron app directory
        run: npm run package:dir

      - name: Upload unsigned app directory
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-windows-app-directory
          path: electron/release/win-unpacked/**
          if-no-files-found: error

  sign-windows-app-directory:
    needs: build-windows-app-directory
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/reactiveui/certum-signer:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    env:
      CERTUM_USER_ID: ${{ secrets.CERTUM_USER_ID }}
      CERTUM_OTP_URI: ${{ secrets.CERTUM_OTP_URI }}
      CERTUM_CERT_FINGERPRINT: ${{ secrets.CERTUM_CERT_FINGERPRINT }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download unsigned app directory
        uses: actions/download-artifact@v4
        with:
          name: unsigned-windows-app-directory
          path: electron/release/win-unpacked

      - name: Validate Certum signing environment
        shell: bash
        run: |
          set -euo pipefail
          : "${CERTUM_USER_ID:?Set the CERTUM_USER_ID repository secret to the SimplySign login id.}"
          : "${CERTUM_OTP_URI:?Set the CERTUM_OTP_URI repository secret to the otpauth:// TOTP URI.}"
          : "${CERTUM_CERT_FINGERPRINT:?Set CERTUM_CERT_FINGERPRINT to the SHA-256 fingerprint of the Certum code-signing certificate.}"
          : "${SS_DIST:?The Certum signer image must expose SS_DIST.}"
          : "${JSIGN_JAR:?The Certum signer image must expose JSIGN_JAR.}"

      - name: Sign inner app executables with Certum SimplySign
        uses: ./.github/actions/certum-sign
        with:
          artifacts-glob: electron/release/win-unpacked/**/*.exe

      - name: Upload signed app directory
        uses: actions/upload-artifact@v4
        with:
          name: signed-windows-app-directory
          path: electron/release/win-unpacked/**
          if-no-files-found: error

  build-windows-installer:
    needs: sign-windows-app-directory
    runs-on: windows-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download signed app directory
        uses: actions/download-artifact@v4
        with:
          name: signed-windows-app-directory
          path: electron/release/win-unpacked

      - name: Build unsigned installer from signed app directory
        run: npm run package:prepackaged --workspace electron

      - name: Verify unsigned updater release artifacts
        run: npm run verify:release-artifacts --workspace electron

      - name: Upload unsigned installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-windows-installer
          path: |
            electron/release/latest.yml
            electron/release/*.exe
            electron/release/*.exe.blockmap
          if-no-files-found: error

  sign-windows-installer:
    needs: build-windows-installer
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/reactiveui/certum-signer:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    env:
      CERTUM_USER_ID: ${{ secrets.CERTUM_USER_ID }}
      CERTUM_OTP_URI: ${{ secrets.CERTUM_OTP_URI }}
      CERTUM_CERT_FINGERPRINT: ${{ secrets.CERTUM_CERT_FINGERPRINT }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download unsigned installer artifacts
        uses: actions/download-artifact@v4
        with:
          name: unsigned-windows-installer
          path: electron/release

      - name: Validate Certum signing environment
        shell: bash
        run: |
          set -euo pipefail
          : "${CERTUM_USER_ID:?Set the CERTUM_USER_ID repository secret to the SimplySign login id.}"
          : "${CERTUM_OTP_URI:?Set the CERTUM_OTP_URI repository secret to the otpauth:// TOTP URI.}"
          : "${CERTUM_CERT_FINGERPRINT:?Set CERTUM_CERT_FINGERPRINT to the SHA-256 fingerprint of the Certum code-signing certificate.}"
          : "${SS_DIST:?The Certum signer image must expose SS_DIST.}"
          : "${JSIGN_JAR:?The Certum signer image must expose JSIGN_JAR.}"

      - name: Sign installer with Certum SimplySign
        uses: ./.github/actions/certum-sign
        with:
          artifacts-glob: electron/release/*.exe

      - name: Upload signed installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: signed-windows-installer
          path: |
            electron/release/latest.yml
            electron/release/*.exe
            electron/release/*.exe.blockmap
          if-no-files-found: error

  publish-windows-installer:
    needs: sign-windows-installer
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies for release metadata refresh
        run: npm ci --ignore-scripts

      - name: Download signed installer artifacts
        uses: actions/download-artifact@v4
        with:
          name: signed-windows-installer
          path: electron/release

      - name: Refresh updater metadata after signing
        run: npm run refresh:signed-release-artifacts --workspace electron

      - name: Verify signed updater release artifacts
        run: npm run verify:release-artifacts --workspace electron

      - name: Upload GitHub release assets
        shell: bash
        run: |
          set -euo pipefail
          : "${GH_TOKEN:?GH_TOKEN is missing.}"

          latest_yml_path="electron/release/latest.yml"
          if [ ! -f "$latest_yml_path" ]; then
            echo "::error::The updater manifest was not found at $latest_yml_path."
            exit 1
          fi

          installer_file_name="$(sed -n 's/^path:[[:space:]]*//p' "$latest_yml_path" | head -1 | tr -d '\r')"
          if [ -z "$installer_file_name" ]; then
            echo "::error::The updater manifest does not include a path entry for the installer."
            exit 1
          fi

          asset_paths=(
            "$latest_yml_path"
            "electron/release/$installer_file_name"
            "electron/release/$installer_file_name.blockmap"
          )

          for asset_path in "${asset_paths[@]}"; do
            if [ ! -f "$asset_path" ]; then
              echo "::error::Expected release asset not found: $asset_path"
              exit 1
            fi
          done

          gh release upload "${{ github.event.release.tag_name }}" "${asset_paths[@]}" --clobber --repo "${{ github.repository }}"

      - name: Verify GitHub release updater assets
        shell: bash
        run: |
          set -euo pipefail
          : "${GH_TOKEN:?GH_TOKEN is missing.}"

          release_json="$(gh api "repos/${{ github.repository }}/releases/${{ github.event.release.id }}")"
          latest_url="$(printf '%s' "$release_json" | jq -r '.assets[] | select(.name == "latest.yml") | .browser_download_url' | head -1)"

          if [ -z "$latest_url" ] || [ "$latest_url" = "null" ]; then
            echo "::error::The published GitHub release is missing latest.yml."
            exit 1
          fi

          latest_yml_content="$(curl --fail --location --silent --header "Authorization: Bearer $GH_TOKEN" --header 'Accept: application/octet-stream' "$latest_url")"
          expected_installer_name="$(printf '%s\n' "$latest_yml_content" | sed -n 's/^path:[[:space:]]*//p' | head -1 | tr -d '\r')"
          manifest_version="$(printf '%s\n' "$latest_yml_content" | sed -n 's/^version:[[:space:]]*//p' | head -1 | tr -d '\r')"

          if [ -z "$expected_installer_name" ]; then
            echo "::error::The published latest.yml is missing the installer path."
            exit 1
          fi

          if [ -z "$manifest_version" ]; then
            echo "::error::The published latest.yml is missing the version field."
            exit 1
          fi

          release_version="${{ github.event.release.tag_name }}"
          release_version="${release_version#v}"
          if [ "$manifest_version" != "$release_version" ]; then
            echo "::error::The published latest.yml version ($manifest_version) does not match the release tag version ($release_version)."
            exit 1
          fi

          expected_blockmap_name="$expected_installer_name.blockmap"
          asset_names="$(printf '%s' "$release_json" | jq -r '.assets[].name')"

          if ! printf '%s\n' "$asset_names" | grep -Fxq "$expected_installer_name"; then
            echo "::error::The published GitHub release is missing the installer referenced by latest.yml: $expected_installer_name"
            exit 1
          fi

          if ! printf '%s\n' "$asset_names" | grep -Fxq "$expected_blockmap_name"; then
            echo "::error::The published GitHub release is missing the blockmap referenced by latest.yml: $expected_blockmap_name"
            exit 1
          fi
